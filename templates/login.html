{% extends 'base.html' %}

{% block head %}
<title>Login - TeoGebra</title>
{% endblock %}

{% block body %}
<div class="content" style="max-width: 400px; margin: 0 auto;">
    <h1 style="text-align: center;">Autentificare</h1>

    {% if mesaj %}
        <p style="color: green; text-align: center; font-weight: bold;">{{ mesaj }}</p>
    {% endif %}
    {% if eroare %}
        <p style="color: red; text-align: center; font-weight: bold;">{{ eroare }}</p>
    {% endif %}

    <form action="/login" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
        <div>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required style="width: 100%; padding: 8px;">
        </div>

        <div>
            <label for="password">Parolă:</label><br>
            <input type="password" id="password" name="password" required style="width: 100%; padding: 8px;">
        </div>

        <button type="submit" style="padding: 10px; background-color: #2196F3; color: white; border: none; cursor: pointer;">Intră în cont</button>
    </form>

    <p style="text-align: center; margin-top: 20px;">
        Nu ai cont? <a href="/signup">Creează unul acum</a>.
    </p>
</div>
{% endblock %}
